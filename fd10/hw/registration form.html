<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="registration.css">
</head>
<body>   
    <div class="header">
        <img src="logo.png" alt="here is the logo">
        
        <p>COMPANY NAME </p>
        <h2>REGISTRATION FORM </h2>
    </div>

    <form>
        
        <fieldset>
           <legend>Personal Information</legend>

                <label> Full Name:</label><br>
           <input type="text" name="fullname"><br><br>


        <label>Gender:</label><br>
         <input type="radio" name="gender" value="Male"> Male
          <input type="radio" name="gender" value="Female"> Female
          
          <br><br>
          
                 <label>Date of Birth:</label><br>
                 <input type="date" name="dob"><br><br>
  
          <label>Place of Birth:</label><br>
          <input type="text" name="pob"><br><br>
          
          <label>Nationality</label><br>
           <input type="text" name="nationality"><br><br>
           <label>religion</label><br>
           <input type="text" name="religion"><br><br>
        
           <label>Residence Status:</label><br>
           <input type= "radio" name="Residence Status " value="Residence"> Residence
           <input type="radio" name="Residence Status" value="Non residence"> Non residence
           <br><br>

           <label>Marital Status:</label><br>
           <input type= "radio" name=" Marital Status " value="Single"> Single
           <input type="radio" name="Marital Status" value="Married"> Married
           <br><br>

              <label>National ID NO.:</label><br>
           <input type="text" name="National ID NO."><br><br>
              <label>TID NO.:</label><br>
           <input type="text" name="  TID NO."><br><br>

         </fieldset>  
         <fieldset>
            <legend> Contact Information</legend> 

               <label>Address:</label><br>
                  <input type="text" name="ADDRESS"><br><br>
          <label>City</label><br>
           <input type="text" name="City"><br><br>
           
         <label>State</label><br>
           <input type="text" name="State"><br><br>
        
           <label>Country</label><br>
           <input type="text" name="Country"><br><br>
        <label>ZIP Code</label><br>
           <input type="text" name="ZIP Code"><br><br>
        
        
             <label>Phone:</label><br>
             <input type="phone no." name="phone"><br><br>
             <label>Email:</label><br>
             <input type="email" name="email"><br><br>
         </fieldset>  
<fieldset>
            <legend> Service Information</legend> 

               <label>Service Name</label><br>
           <input type="text" name="Service Name"><br><br>

           <label>Payment Detail:</label><br>
         <input type="radio" name="payment Detail" value="Cash"> Cash
          <input type="radio" name="payment Detail" value="Debit Card"> Debit Card
          <input type="radio" name="Payment Detail" value="Credit Card"> Credit Card
          
          <br><br>
          <label>Comments:</label><br>
         <input type="text" name="Comments" >
         <input type="text" name="Comments" >
          
          
          <br><br>

        
        

   
        
        


        
        

        
    </form>

</body>
</html>
