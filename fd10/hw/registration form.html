<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="registration.css">
</head>
<body>
    <div class="header">
        
        <p>COMPANY NAME </p>
        <h2>REGISTRATION FORM </h2>
    </div>

    <form>
        
        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Place of Birth:</label><br>
        <input type="text" name="pob"><br><br>

       <label>Nationality</label><br>
        <input type="text" name="nationality"><br><br>
   

       <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br><label>Gender:</label><br>
        
        
        
        
        <input type= "radio" name="Residence Status " value="Residence"> Residence
        <input type="radio" name="Residence Status" value="Non residence"> Non residence
        <br><br><label>Residence Status:</label><br>
        

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Course:</label><br>
        <select name="course">
            <option>BCA</option>
            <option>B.Tech</option>
            <option>MCA</option>
            <option>M.Tech</option>
        </select>
        <br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>

        <input type="checkbox" required>
        I agree to the Terms and Conditions
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
