<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <img id="photo"      src="https://www.w3schools.com/JS/pic_bulboff.gif" alt="">
    
    <button id="btnOn" onclick="On()">Turn On</button>
    <button id="btnOff" onmouseover="Off()">Turn Off</button>
    <script>
        function On(){
            photo=document.querySelector("#photo")
            photo .src="https://www.w3schools.com/JS/pic_bulbon.gif"

        }
        function Off(){
          
            photo. src="https://www.w3schools.com/JS/pic_bulboff.gif"
            photo.style.aligncentre;




        }

    </script>
</body>
</html>
